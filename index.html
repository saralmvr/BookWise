<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>BookWise</h1>
                <p>Gerencie seus livros de forma simples e eficiente</p>
            </div>
            <button id="darkModeBtn" class="dark-mode-btn">Modo Escuro</button>
        </header>

        <div class="form-container">
            <h2>Adicionar Novo Livro</h2>
            <form id="bookForm">
                <div class="form-group">
                    <input type="text" id="title" placeholder="Título do livro *" required>
                </div>
                <div class="form-group">
                    <input type="text" id="author" placeholder="Autor *" required>
                </div>
                <div class="form-group">
                    <input type="number" id="year" placeholder="Ano de publicação *" min="0" max="2026" required>
                </div>
                <div class="form-group">
                    <input type="number" id="pages" placeholder="Número de páginas (opcional)" min="0">
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="read"> Já li este livro
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Adicionar Livro</button>
            </form>
        </div>

        <div class="stats-container">
            <h2>Estatísticas</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalBooks">0</div>
                    <div class="stat-label">Total de Livros</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="readBooks">0</div>
                    <div class="stat-label">Livros Lidos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalPaginasLidas">0</div>
                    <div class="stat-label">Total de Páginas Lidas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="metaProgress">0%</div>
                    <div class="stat-label">Meta de Leitura</div>
                </div>
            </div>
           
            <div class="meta-container">
                <div class="meta-header">
                    <span>Meta Anual: <span id="metaAtual">12</span> livros</span>
                    <button id="editarMetaBtn" class="btn-meta">Editar Meta</button>
                </div>
                <div class="meta-bar-container">
                    <div class="meta-bar-fill" id="metaBarFill" style="width: 0%"></div>
                </div>
                <div class="meta-info">
                    <span id="livrosFaltando">Faltam 12 livros para bater a meta</span>
                </div>
            </div>
        </div>

        <div class="filters-container">
            <h2>Filtros e Busca</h2>
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Filtrar por status:</label>
                    <select id="statusFilter">
                        <option value="all">Todos os livros</option>
                        <option value="read">Já lidos</option>
                        <option value="unread">Não lidos</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Buscar por título/autor:</label>
                    <input type="text" id="searchInput" placeholder="Digite para buscar...">
                </div>
                <div class="filter-group">
                    <label>Ordenar por:</label>
                    <select id="sortBy">
                        <option value="title">Título (A-Z)</option>
                        <option value="yearAsc">Ano (crescente)</option>
                        <option value="yearDesc">Ano (decrescente)</option>
                        <option value="author">Autor (A-Z)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="books-container">
            <div class="books-header">
                <div class="header-left-group">
                    <h2>Meus Livros</h2>
                    <div class="view-buttons">
                        <button id="gridViewBtn" class="view-btn active">Tabela</button>
                        <button id="listViewBtn" class="view-btn">Lista</button>
                    </div>
                </div>
            </div>
            <div id="booksList" class="books-list grid-view">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
